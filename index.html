<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>EquiTune Derby</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="race-stage" aria-label="3D race view">
        <canvas id="raceCanvas"></canvas>
        <div class="horse-labels" id="horseLabels" aria-hidden="true"></div>
        <div class="race-intro" id="raceIntro" aria-hidden="true">
          <p class="race-intro-kicker">Race Title</p>
          <strong id="raceIntroTitle">EquiTune Derby</strong>
          <span id="raceIntroCountdown">まもなく発走</span>
        </div>
        <div class="preview-copy">
          <p class="eyebrow">EquiTune Derby</p>
          <h1>ステータス調整競馬</h1>
        </div>
        <div class="topbar">
          <div>
            <p class="eyebrow">EquiTune Derby</p>
            <h1>ステータス調整競馬</h1>
          </div>
          <div class="race-status">
            <span id="racePhase">調整中</span>
            <strong id="distanceReadout">2周</strong>
          </div>
        </div>
        <div class="leaderboard" id="leaderboard"></div>
        <div class="race-meta" id="raceMeta"></div>
        <div class="broadcast-hud" id="broadcastHud" hidden>
          <div class="position-map" id="positionMap" aria-label="馬群位置"></div>
          <div class="course-info">
            <div class="mini-course" id="miniCourse" aria-label="コース位置"></div>
            <div class="telemetry">
              <span id="remainingReadout">残り --m</span>
              <strong id="speedReadout">--.-km/h</strong>
            </div>
          </div>
        </div>
        <div class="commentary" id="commentary"></div>
        <div class="result-detail" id="resultDetail" hidden></div>
      </section>

      <aside class="control-panel" aria-label="horse tuning controls">
        <div class="horse-card">
          <div class="horse-name-row">
            <div class="field-label-row">
              <label for="matchName">試合名</label>
              <span id="matchNameCount">0/12</span>
            </div>
            <p class="field-message" id="matchNameMessage" hidden></p>
            <div class="match-name-row">
              <input id="matchName" maxlength="12" value="エキチューン" />
              <select id="matchSuffix" aria-label="試合名の語尾">
                <option value="ステークス">ステークス</option>
                <option value="カップ">カップ</option>
                <option value="杯">杯</option>
                <option value="賞">賞</option>
                <option value="記念">記念</option>
                <option value="ダービー" selected>ダービー</option>
                <option value="オークス">オークス</option>
              </select>
            </div>
          </div>
          <div class="horse-name-row">
            <label for="horseName">馬名</label>
            <p class="field-message" id="horseNameMessage" hidden></p>
            <input id="horseName" maxlength="14" value="カスタムスター" />
          </div>
          <div class="budget-row">
            <p class="field-message" id="budgetMessage" hidden></p>
            <span>残りポイント</span>
            <strong id="budgetLeft">0</strong>
          </div>
        </div>

        <div class="stat-list" id="statList"></div>

        <div class="strategy-panel">
          <label for="lapCount">周回数</label>
          <select id="lapCount">
            <option value="1">1周</option>
            <option value="2" selected>2周</option>
            <option value="3">3周</option>
          </select>
          <label for="distanceType">距離タイプ</label>
          <select id="distanceType">
            <option value="sprint">短距離</option>
            <option value="mile">マイル</option>
            <option value="middle" selected>中距離</option>
            <option value="long">長距離</option>
          </select>
          <label>馬場状態</label>
          <div class="readonly-field" id="trackConditionPreview">ランダム</div>
          <label for="runningStyle">脚質</label>
          <select id="runningStyle">
            <option value="front">逃げ</option>
            <option value="stalker" selected>先行</option>
            <option value="closer">差し</option>
            <option value="deep">追込</option>
          </select>
          <label for="traitSelect">特性</label>
          <select id="traitSelect">
            <option value="finish" selected>末脚</option>
            <option value="mud">道悪適性</option>
            <option value="corner">コーナー巧者</option>
            <option value="start">スタート上手</option>
            <option value="hill">坂適性</option>
          </select>
          <label class="toggle-row" for="voiceToggle">
            <input id="voiceToggle" type="checkbox" />
            <span>実況音声</span>
          </label>
          <label class="toggle-row" for="labelToggle">
            <input id="labelToggle" type="checkbox" />
            <span>馬上表示</span>
          </label>
          <label class="toggle-row" for="fanfareToggle">
            <input id="fanfareToggle" type="checkbox" />
            <span>ファンファーレ</span>
          </label>
          <label for="fanfareSelect">ファンファーレ音源</label>
          <select id="fanfareSelect">
            <option value="G1ファンファーレ(京都阪神競馬).mp3">京都・阪神G1</option>
            <option value="G1ファンファーレ(中山競馬場).mp3">中山G1</option>
            <option value="G1ファンファーレ(宝塚記念).mp3">宝塚記念</option>
          </select>
        </div>

        <div class="button-row">
          <button id="randomizeBtn" type="button">ランダム調整</button>
          <button id="startBtn" type="button" class="primary">出走</button>
        </div>
      </aside>
    </main>

    <script src="game.js"></script>
  </body>
</html>
