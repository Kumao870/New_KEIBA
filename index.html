<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>EquiTune Derby</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="race-stage" aria-label="3D race view">
        <canvas id="raceCanvas"></canvas>
        <div class="horse-labels" id="horseLabels" aria-hidden="true"></div>
        <div class="race-intro" id="raceIntro" aria-hidden="true">
          <p class="race-intro-kicker">Race Title</p>
          <strong id="raceIntroTitle">EquiTune Derby</strong>
          <span id="raceIntroCountdown">まもなく発走</span>
        </div>
        <div class="preview-copy">
          <p class="eyebrow">EquiTune Derby</p>
          <h1>ステータス調整競馬</h1>
        </div>
        <div class="topbar">
          <div>
            <p class="eyebrow">EquiTune Derby</p>
            <h1>ステータス調整競馬</h1>
          </div>
          <div class="race-status">
            <span id="racePhase">調整中</span>
            <strong id="distanceReadout">2周</strong>
          </div>
        </div>
        <div class="leaderboard" id="leaderboard"></div>
      </section>

      <aside class="control-panel" aria-label="horse tuning controls">
        <div class="horse-card">
          <div class="horse-name-row">
            <div class="field-label-row">
              <label for="matchName">試合名</label>
              <span id="matchNameCount">0/12</span>
            </div>
            <p class="field-message" id="matchNameMessage" hidden></p>
            <div class="match-name-row">
              <input id="matchName" maxlength="12" value="エキチューン" />
              <select id="matchSuffix" aria-label="試合名の語尾">
                <option value="ステークス">ステークス</option>
                <option value="カップ">カップ</option>
                <option value="杯">杯</option>
                <option value="賞">賞</option>
                <option value="記念">記念</option>
                <option value="ダービー" selected>ダービー</option>
                <option value="オークス">オークス</option>
              </select>
            </div>
          </div>
          <div class="horse-name-row">
            <label for="horseName">馬名</label>
            <p class="field-message" id="horseNameMessage" hidden></p>
            <input id="horseName" maxlength="14" value="カスタムスター" />
          </div>
          <div class="budget-row">
            <p class="field-message" id="budgetMessage" hidden></p>
            <span>残りポイント</span>
            <strong id="budgetLeft">0</strong>
          </div>
        </div>

        <div class="stat-list" id="statList"></div>

        <div class="strategy-panel">
          <label for="lapCount">周回数</label>
          <select id="lapCount">
            <option value="1">1周</option>
            <option value="2" selected>2周</option>
            <option value="3">3周</option>
          </select>
        </div>

        <div class="button-row">
          <button id="randomizeBtn" type="button">ランダム調整</button>
          <button id="startBtn" type="button" class="primary">出走</button>
        </div>
      </aside>
    </main>

    <script src="game.js"></script>
  </body>
</html>
